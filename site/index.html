<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Site Builder — Ready</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 560px;
      text-align: center;
      padding: 48px 32px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      backdrop-filter: blur(20px);
    }
    .emoji { font-size: 4rem; margin-bottom: 16px; }
    h1 { font-size: 2rem; margin-bottom: 12px; font-weight: 700; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 8px; }
    code {
      background: rgba(255, 255, 255, 0.08);
      padding: 4px 10px;
      border-radius: 6px;
      font-family: 'SF Mono', Menlo, monospace;
      font-size: 0.9em;
      color: #f59e0b;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #4ade80;
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 500;
      margin-top: 24px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🚀</div>
    <h1>Cloudflare Pages — Live</h1>
    <p>This is your starter site, deployed automatically from <code>site/</code> via <code>git push</code>.</p>
    <p>Open <strong>Claude Code Web</strong> on this repo and type <code>/new-site &lt;your description&gt;</code> to replace this with a real website.</p>
    <div class="badge">
      <span class="dot"></span>
      Deploy successful
    </div>
  </div>
</body>
</html>
